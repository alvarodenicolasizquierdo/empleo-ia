[phases.setup]
nixPkgs = ["nodejs_20", "nginx"]

[phases.install]
cmds = ["npm install"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = """
echo 'server { \
  listen 3000; \
  root /assets/dist; \
  index index.html; \
  location / { \
    try_files $uri $uri/ /index.html; \
  } \
  location /data/ { \
    add_header Cache-Control "public, max-age=3600"; \
  } \
  location /assets/ { \
    add_header Cache-Control "public, max-age=31536000, immutable"; \
  } \
}' > /tmp/nginx.conf && nginx -c /tmp/nginx.conf -g 'daemon off;'
"""
